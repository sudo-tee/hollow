name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Zig
        uses: mlugg/setup-zig@v2

      - name: Apply sokol patch (run setup script)
        run: bash scripts/setup.sh

      - name: Install MinGW (windres for .rc files)
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Build Windows release
        run: ./launch.sh --build-only
        env:
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/.zig-local-cache
          ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.zig-global-cache

      - name: Build WSL bypass helper
        run: zig build wsl-bypass -Doptimize=ReleaseFast
        env:
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/.zig-local-cache
          ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.zig-global-cache

      - name: Stage release bundle
        run: |
          mkdir -p release/hollow/conf release/hollow/wsl release/hollow/scripts
          cp zig-out/bin/*.exe release/hollow/
          cp zig-out/bin/hollow-wsl-bypass release/hollow/wsl/
          cp scripts/hollow-cli release/hollow/
          cp conf/init.lua release/hollow/conf/
          cp scripts/install-wsl-bypass.sh release/hollow/scripts/

      - name: Archive release bundle
        run: |
          cd release
          zip -r hollow-windows-x86_64.zip hollow

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: hollow-windows-x86_64
          path: release/hollow-windows-x86_64.zip

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/hollow-windows-x86_64.zip

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Zig
        uses: mlugg/setup-zig@v2

      - name: Install Linux runtime dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxi-dev libxcursor-dev libgl1-mesa-dev libasound2-dev pkg-config

      - name: Apply sokol patch (run setup script)
        run: bash scripts/setup.sh

      - name: Build Linux release
        run: zig build -Doptimize=ReleaseFast
        env:
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/.zig-local-cache
          ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.zig-global-cache

      - name: Stage release bundle
        run: |
          mkdir -p release/hollow-linux-x86_64/conf
          cp zig-out/bin/hollow release/hollow-linux-x86_64/
          cp zig-out/bin/hollow-cli release/hollow-linux-x86_64/
          cp conf/init.lua release/hollow-linux-x86_64/conf/

      - name: Archive release bundle
        run: |
          cd release
          tar -czf hollow-linux-x86_64.tar.gz hollow-linux-x86_64

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: hollow-linux-x86_64
          path: release/hollow-linux-x86_64.tar.gz

      - name: Publish GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/hollow-linux-x86_64.tar.gz
